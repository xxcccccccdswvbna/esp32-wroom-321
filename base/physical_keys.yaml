binary_sensor:
  - platform: gpio
    id: key1
    name: KEY1
    pin:
      number: GPIO34
      inverted: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_multi_click:
      - timing:
          - ON for at least 8s
        then:
          - if:
              condition:
                binary_sensor.is_on: key4
              then:
                - delay: 500ms
                - if:
                    condition:
                      binary_sensor.is_on: key4
                    then:
                      - lambda: 'id(do_factory_reset) = true;'
                      - repeat:
                          count: 5
                          then:
                            - light.toggle: white_led
                            - delay: 100ms
                      - lambda: 'App.reboot();'
      - timing:
          - ON for at least 1.5s
        then:
          - light.turn_on: blue_led
          - delay: 200ms
          - light.turn_off: blue_led
          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key1"
                mode: "long"
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - light.turn_on: blue_led
          - delay: 200ms
          - light.turn_off: blue_led
          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key1"
                mode: "double"
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - light.turn_on: blue_led
          - delay: 200ms
          - light.turn_off: blue_led
          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key1"
                mode: "single"

