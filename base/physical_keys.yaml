          - light.turn_off: blue_led
          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key2"
                mode: "single"
          - lambda: 'id(safe_mode_tap_count)++;'
          - if:
              condition:
                lambda: 'return id(safe_mode_tap_count) >= 5;'
              then:
                - lambda: 'id(safe_mode_tap_count) = 0;'
                - repeat:
                    count: 8
                    then:
                      - light.toggle: blue_led
                      - delay: 150ms
                - lambda: 'App.safe_reboot();'
              else:
                - delay: 5000ms
                - lambda: 'id(safe_mode_tap_count) = 0;'

